<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>کبوتر | قیمت‌های طلا و ارز</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="app-container">
  
        <main class="main-content">

            <div class="welcome-header">
                <div class="user-greeting">
                    <i class="fas fa-crown crown-icon"></i>
                    <span id="user">درحال دریافت اطلاعات...</span>
                </div>
                <div class="date-display">
                    <i class="far fa-calendar-alt"></i>
                    <span id="persianDate">در حال بارگذاری...</span>
                </div>
            </div>


            <div class="gold-card">
                <div class="gold-icon">
                    <i class="fas fa-coins"></i>
                </div>
                <div class="gold-price-container">
                    <span class="gold-label">قیمت هر گرم طلا 18 عیار</span>
                    <div class="gold-price" id="goldPrice">
                        <span class="price-number">در حال بروزرسانی...</span>
                    </div>
                </div>
                <div class="gold-change" id="goldChange">
                    <i class="fas fa-minus"></i> 0%
                </div>
            </div>


            <div class="currency-grid">
                <div class="currency-card" id="dollarCard">
                    <div class="currency-header">
                        <i class="fas fa-dollar-sign currency-icon"></i>
                        <span class="currency-name">دلار</span>
                    </div>
                    <div class="currency-price" id="dollarPrice">---</div>
                    <div class="currency-change" id="dollarChange">0%</div>
                </div>

                <div class="currency-card" id="euroCard">
                    <div class="currency-header">
                        <i class="fas fa-euro-sign currency-icon"></i>
                        <span class="currency-name">یورو</span>
                    </div>
                    <div class="currency-price" id="euroPrice">---</div>
                    <div class="currency-change" id="euroChange">0%</div>
                </div>

                <div class="currency-card" id="dirhamCard">
                    <div class="currency-header">
                        <i class="fas fa-money-bill-wave currency-icon"></i>
                        <span class="currency-name">درهم</span>
                    </div>
                    <div class="currency-price" id="dirhamPrice">---</div>
                    <div class="currency-change" id="dirhamChange">0%</div>
                </div>

                <div class="currency-card" id="poundCard">
                    <div class="currency-header">
                        <i class="fas fa-gbp currency-icon"></i>
                        <span class="currency-name">پوند</span>
                    </div>
                    <div class="currency-price" id="poundPrice">---</div>
                    <div class="currency-change" id="poundChange">0%</div>
                </div>
            </div>

            <div class="update-info">
                <i class="fas fa-sync-alt"></i>
                <span id="lastUpdate">آخرین به‌روزرسانی: چند لحظه پیش</span>
            </div>
        </main>


        <nav class="bottom-nav">
            <div class="nav-item active" id="navHome">
                <i class="fas fa-home"></i>
                <span>خانه</span>
            </div>
            <div class="nav-item" id="navGold">
                <i class="fas fa-coins"></i>
                <span>طلا</span>
            </div>
            <div class="nav-item" id="navCurrency">
                <i class="fas fa-chart-line"></i>
                <span>ارز</span>
            </div>
            <div class="nav-item" id="navProfile">
                <i class="fas fa-user"></i>
                <span>پروفایل</span>
            </div>
        </nav>
    </div>

    <script src="script.js"></script>
</body>

</html>
